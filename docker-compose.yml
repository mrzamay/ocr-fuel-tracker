version: '3.8'

services:
  app:
    build:
      context: ./docker/php
    container_name: fuel_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./src:/var/www
    depends_on:
      - db

  web:
    image: nginx:alpine
    container_name: fuel_web
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./src:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  db:
    image: postgres:16-alpine
    container_name: fuel_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: fuel_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data

  ocr:
    build:
      context: ./docker/ocr
    container_name: fuel_ocr
    restart: unless-stopped
    ports:
      - "8000:8000"

volumes:
  db-data: